apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kyma-project.io--rt-bootstrapper--allow-egress-to-apiserver
  namespace: system
  labels:
    app.kubernetes.io/name: rt-bootstrapper
    app.kubernetes.io/managed-by: kustomize
    purpose: apiserver
spec:
  egress:
    - ports:
        - port: 443
          protocol: TCP
  podSelector:
    matchLabels:
      app.kubernetes.io/name: rt-bootstrapper
  policyTypes:
    - Egress